<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>لمعة — الخدمة غير متوفرة حالياً</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg1:#e8fbff;
      --bg2:#f8fffe;
      --card:#ffffffee;
      --ink:#0f172a;
      --muted:#64748b;
      --brand:#06b6d4;
      --brand-dark:#0891b2;
      --line:#e2e8f0;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Tajawal',system-ui,sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      color:var(--ink);
      background:
        radial-gradient(800px 500px at 100% 0%, rgba(6,182,212,.16), transparent),
        radial-gradient(800px 500px at 0% 100%, rgba(45,212,191,.12), transparent),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }
    .card{
      width:100%;
      max-width:460px;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:28px;
      padding:28px 24px 24px;
      text-align:center;
      box-shadow:0 18px 60px rgba(15,23,42,.12);
      backdrop-filter: blur(10px);
    }
    .logo{
      width:112px;
      height:112px;
      margin:0 auto 14px;
      border-radius:28px;
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:0 10px 26px rgba(15,23,42,.10);
      overflow:hidden;
      border:1px solid #eef2f7;
    }
    .logo img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      display:block;
    }
    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:8px 14px;
      margin-bottom:14px;
      border-radius:999px;
      background:#ecfeff;
      color:var(--brand-dark);
      font-size:12px;
      font-weight:700;
      border:1px solid #cffafe;
    }
    h1{
      font-size:28px;
      line-height:1.45;
      font-weight:800;
      margin-bottom:10px;
    }
    .lead{
      font-size:16px;
      line-height:1.9;
      color:var(--muted);
      margin-bottom:14px;
    }
    .highlight{
      color:var(--brand-dark);
      font-weight:700;
      font-size:15px;
      margin-bottom:8px;
    }
    .footer{
      font-size:13px;
      color:var(--muted);
      margin-top:6px;
    }
    @media (max-width:480px){
      .card{padding:24px 18px 20px}
      h1{font-size:24px}
      .lead{font-size:15px}
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">
      <img src="https://i.ibb.co/k2wtWBrW/unnamed.jpg" alt="شعار لمعة">
    </div>

    <div class="badge">خدمة لمعة</div>

    <h1>الخدمة غير متوفرة في الوقت الحالي</h1>

    <p class="lead">
      نعتذر منكم، ونفيدكم بأن الخدمة غير متاحة حالياً .
      نعمل على العودة لخدمتكم بأفضل جودة وفي أقرب وقت ممكن.
    </p>

    <p class="highlight">شكراً لتفهمكم وتعاونكم.</p>
    
  </main>
</body>
</html>
